version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/core"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "composer"
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    security-updates: true

  - package-ecosystem: "composer"
    directory: "/modules"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "composer"
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    security-updates: true

  - package-ecosystem: "npm"
    directory: "/core"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "npm"
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    security-updates: true